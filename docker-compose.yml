version: '3.8'

services:
  db:
    image: mysql:5.7
    container_name: mcp_mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: okhla3
      MYSQL_USER: mcp_user
      MYSQL_PASSWORD: AirtelAI@#1
      MYSQL_DATABASE: mcp_demo
      MYSQL_DATABASE: mcp_db
    ports:
      - "3308:3306"
    volumes:
      - ./data:/docker-entrypoint-initdb.d:Z
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pokhla3"]
      timeout: 5s
      retries: 3
      interval: 20s

  mcp-server:
    build: 
      context: .
      dockerfile: mcp-server.Dockerfile
    container_name: python_mcp_server
    restart: always
    stdin_open: true
    tty: true
    depends_on:
      db:
        condition: service_healthy

volumes:
  data:
